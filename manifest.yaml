# Quickstart provider — register with the kedge hub.
#
# Apply this against the kcp workspace where the kedge.faros.sh APIExport is
# bound (typically the user's tenant workspace, or root:kedge:providers when
# running embedded kcp for development).
#
#   kubectl --kubeconfig kcp-admin.kubeconfig apply -f manifest.yaml
#
# For local dev with the provider binary running on the host machine:
#   - spec.ui.url / spec.backend.url point at host.docker.internal or the
#     loopback the hub can reach. Override below as needed.
#
# For in-cluster deployment, change the URLs to the Service DNS, e.g.
#   url: http://quickstart.providers.svc.cluster.local:8081
#
# ════════════════════════════════════════════════════════════════════════
# Provider object reference — kind: CatalogEntry (providers.kedge.faros.sh)
#
# A CatalogEntry registers one provider ("plugin") with the kedge hub. The
# hub's catalog controller reconciles it into the provider sub-workspace
# root:kedge:providers:<name>, a ServiceAccount + runtime kubeconfig, the
# APIExport tenants APIBind to, and a routing entry backing
# /ui/providers/<name>/* and /services/providers/<name>/*.
#
# spec:
#   displayName              Title on the portal catalog card + side nav. [required]
#   description              Short blurb on the catalog card.
#   vendor                   Provider author.
#   version                  Provider/chart version (informational).
#   category                 Groups the entry under a portal nav heading.
#   iconURL                  Portal-relative icon path (served via the UI proxy).
#   serviceAccountNamespace  Host namespace the provider Deployment runs in;
#                            the hub writes kedge-provider-kubeconfig here.
#   ui:                      Micro-frontend (omit for a UI-less provider).
#     url                      Address the hub reverse-proxies for
#                              /ui/providers/<name>/* (exclusive with builtinRoute).
#     indexPath                Default landing path within the UI (default "/").
#     builtinRoute             Portal renders an in-tree route by this name
#                              instead of loading a bundle (first-party providers).
#     children[]               Sub-nav entries: {displayName, builtinRoute}.
#   backend:                 Custom HTTP backend (omit for CR-only providers).
#     url                      Address proxied at /services/providers/<name>/*
#                              (NOT for CRD traffic — CRs flow through kcp).
#     healthPath               GET path that gates the BackendHealthy status.
#   virtualWorkspace:        Advanced opt-in for custom non-CRD verbs (Phase 5).
#   apiExport:               The provider's kcp APIExport.
#     name                     Fully-qualified APIExport name tenants APIBind to.
#     permissionClaims[]       Access the provider needs in tenant workspaces:
#                              {resource, group, verbs, tenantScoped}. tenantScoped:
#                              true auto-accepts on Enable.
#     schemas[]                Inline APIResourceSchemas to install ({groupResource,
#                              body}); [] = pure broker, no CRDs leak to tenants.
# ════════════════════════════════════════════════════════════════════════
---
apiVersion: providers.kedge.faros.sh/v1alpha1
kind: CatalogEntry
metadata:
  name: quickstart
spec:
  displayName: "Quickstart"
  description: "Reference provider demonstrating the kedge plugin surface."
  vendor: "kedge"
  version: "0.1.0"
  category: "Demo"
  iconURL: "/ui/providers/quickstart/icon.svg"
  serviceAccountNamespace: "quickstart"
  ui:
    url: "http://localhost:8081"
    indexPath: "/"
  backend:
    url: "http://localhost:8081"
    healthPath: "/healthz"
  # Provider-owned APIExport. The hub catalog controller materializes the
  # sub-workspace root:kedge:providers:quickstart, applies the inline
  # APIResourceSchema(s), and creates an APIExport that tenants can bind
  # to. Phase 3 will wire the tenant-side Enable flow.
  apiExport:
    name: "quickstart.providers.kedge.faros.sh"
    # Sample permission claim so the portal's Enable dialog has something to
    # render. The quickstart provider does not actually read configmaps —
    # this is purely for demonstration. Marked tenantScoped so the dialog
    # pre-checks it as safe-to-accept.
    permissionClaims:
      - resource: configmaps
        verbs: [get, list, watch]
        tenantScoped: true
    schemas:
      - groupResource: "greetings.quickstart.providers.kedge.faros.sh"
        # Schema body is applied verbatim into the sub-workspace. The name
        # must include a content-version segment because kcp treats
        # APIResourceSchemas as immutable; a body change requires a new name.
        body: |
          apiVersion: apis.kcp.io/v1alpha1
          kind: APIResourceSchema
          metadata:
            name: v260522-001.greetings.quickstart.providers.kedge.faros.sh
          spec:
            group: quickstart.providers.kedge.faros.sh
            names:
              kind: Greeting
              listKind: GreetingList
              plural: greetings
              singular: greeting
            scope: Namespaced
            versions:
              - name: v1alpha1
                served: true
                storage: true
                subresources:
                  status: {}
                schema:
                  type: object
                  properties:
                    apiVersion: { type: string }
                    kind: { type: string }
                    metadata: { type: object }
                    spec:
                      type: object
                      properties:
                        message:
                          type: string
                          maxLength: 256
                    status:
                      type: object
                      properties:
                        observedAt:
                          type: string
                          format: date-time
